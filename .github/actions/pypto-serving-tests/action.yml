name: Run pypto-serving model tests
description: >-
  Checkout pypto-serving, replace its pypto-lib submodule with the current
  pypto-lib checkout under test, and run the selected serving tests via
  task-submit.

inputs:
  pypto-lib-checkout-path:
    description: Workspace-relative path to the pypto-lib checkout under test.
    required: true
  pypto-serving-checkout-path:
    description: Workspace-relative path where pypto-serving should be checked out.
    required: true
  model-name:
    description: Serving model guard to run (qwen3-14b or deepseek-v4).
    required: true
  pto2-ring-dep-pool:
    description: PTO2_RING_DEP_POOL value for pypto-serving tests.
    required: false
    default: "16384"
  pto2-ring-task-window:
    description: PTO2_RING_TASK_WINDOW value for pypto-serving tests.
    required: false
    default: "16384"
  pto2-ring-heap:
    description: PTO2_RING_HEAP value for pypto-serving tests.
    required: false
    default: "1073741824"

runs:
  using: composite
  steps:
    - name: Resolve model dir
      # setup-ci-job loads the runner config and exports the model dirs;
      # this only picks the one the selected guard needs and checks the weights
      # are actually there. First step on purpose: fail here with an actionable
      # message, not 40 minutes later inside pytest as an opaque
      # "PYPTO_*_MODEL_DIR not set or not a directory".
      id: model
      shell: bash
      env:
        MODEL_NAME: ${{ inputs.model-name }}
      run: |
        set -uo pipefail
        case "$MODEL_NAME" in
          qwen3-14b)   key=PYPTO_QWEN3_MODEL_DIR; value="${PYPTO_QWEN3_MODEL_DIR:-}" ;;
          deepseek-v4) key=PYPTO_DSV4_MODEL_DIR;  value="${PYPTO_DSV4_MODEL_DIR:-}" ;;
          *) echo "::error::unknown model-name '$MODEL_NAME'"; exit 1 ;;
        esac
        if [ -z "$value" ]; then
          echo "::error::$key is not set — add it to this runner's .env"
          echo "(<runner-root>/.env, which setup-ci-job reads; restart the"
          echo "runner service after editing it)"
          exit 1
        fi
        if [ ! -d "$value" ]; then
          echo "::error::$key points at a missing directory: $value"
          echo "The $MODEL_NAME weights are not present on this runner."
          exit 1
        fi
        echo "dir=$value" >> "$GITHUB_OUTPUT"
        echo "$MODEL_NAME model dir resolved from the runner config"

    - name: Checkout pypto-serving
      uses: actions/checkout@v4
      with:
        repository: hw-native-sys/pypto-serving
        ref: main
        path: ${{ inputs.pypto-serving-checkout-path }}
        submodules: recursive
        persist-credentials: false

    - name: Override pypto-serving submodule with pypto-lib under test
      shell: bash
      env:
        PYPTO_LIB_CHECKOUT: ${{ inputs.pypto-lib-checkout-path }}
        PYPTO_SERVING_CHECKOUT: ${{ inputs.pypto-serving-checkout-path }}
      run: |
        PYPTO_LIB_SHA=$(git -C "$PYPTO_LIB_CHECKOUT" rev-parse HEAD)
        rm -rf "$PYPTO_SERVING_CHECKOUT/pypto-lib"
        git clone --no-checkout "$PYPTO_LIB_CHECKOUT" "$PYPTO_SERVING_CHECKOUT/pypto-lib"
        git -C "$PYPTO_SERVING_CHECKOUT/pypto-lib" checkout "$PYPTO_LIB_SHA"
        echo "pypto-lib under test: $(git -C "$PYPTO_SERVING_CHECKOUT/pypto-lib" rev-parse HEAD)"
        echo "pypto-serving base:  $(git -C "$PYPTO_SERVING_CHECKOUT" rev-parse HEAD)"

    - name: Install pypto-serving test dependencies
      shell: bash
      working-directory: ${{ inputs.pypto-lib-checkout-path }}
      run: |
        source activate.sh
        pip install transformers safetensors pytest fastapi uvicorn msgspec

    - name: Run pypto-serving Qwen tests
      if: ${{ inputs.model-name == 'qwen3-14b' }}
      shell: bash
      env:
        PYPTO_QWEN3_MODEL_DIR: ${{ steps.model.outputs.dir }}
        PTO2_RING_DEP_POOL: ${{ inputs.pto2-ring-dep-pool }}
        PTO2_RING_TASK_WINDOW: ${{ inputs.pto2-ring-task-window }}
        PTO2_RING_HEAP: ${{ inputs.pto2-ring-heap }}
        PYPTO_LIB_CHECKOUT: ${{ inputs.pypto-lib-checkout-path }}
        PYPTO_SERVING_CHECKOUT: ${{ inputs.pypto-serving-checkout-path }}
      run: |
        source "$GITHUB_WORKSPACE/$PYPTO_LIB_CHECKOUT/activate.sh"
        run_cmd="source $GITHUB_WORKSPACE/$PYPTO_LIB_CHECKOUT/activate.sh"
        run_cmd="$run_cmd && cd $GITHUB_WORKSPACE/$PYPTO_SERVING_CHECKOUT"
        run_cmd="$run_cmd && DEVICE_ID=\$TASK_DEVICE"
        run_cmd="$run_cmd PYTHONPATH=$GITHUB_WORKSPACE/$PYPTO_SERVING_CHECKOUT"
        run_cmd="$run_cmd PYPTO_QWEN3_MODEL_DIR=$PYPTO_QWEN3_MODEL_DIR"
        run_cmd="$run_cmd PTO2_RING_DEP_POOL=$PTO2_RING_DEP_POOL"
        run_cmd="$run_cmd PTO2_RING_TASK_WINDOW=$PTO2_RING_TASK_WINDOW"
        run_cmd="$run_cmd PTO2_RING_HEAP=$PTO2_RING_HEAP"
        run_cmd="$run_cmd python -m pytest tests/test_qwen3_accuracy.py -q -s"
        task-submit --device "$DEVICE_ID" --timeout 3600 --max-time 1800 \
          --run "$run_cmd"

    - name: Run pypto-serving DeepSeek V4 accuracy test
      if: ${{ inputs.model-name == 'deepseek-v4' }}
      shell: bash
      env:
        PYPTO_DSV4_MODEL_DIR: ${{ steps.model.outputs.dir }}
        PYPTO_RUNTIME_LOG: error
        PTO2_RING_DEP_POOL: ${{ inputs.pto2-ring-dep-pool }}
        PTO2_RING_TASK_WINDOW: ${{ inputs.pto2-ring-task-window }}
        PTO2_RING_HEAP: ${{ inputs.pto2-ring-heap }}
        PTO2_OP_EXECUTE_TIMEOUT_US: 400000000
        PTO2_STREAM_SYNC_TIMEOUT_MS: 440000
        PTO2_SCHEDULER_TIMEOUT_MS: 320000
        SERVING_WORKER_STEP_TIMEOUT: 1800
        PYPTO_LIB_CHECKOUT: ${{ inputs.pypto-lib-checkout-path }}
        PYPTO_SERVING_CHECKOUT: ${{ inputs.pypto-serving-checkout-path }}
      run: |
        source "$GITHUB_WORKSPACE/$PYPTO_LIB_CHECKOUT/activate.sh"
        run_cmd="source $GITHUB_WORKSPACE/$PYPTO_LIB_CHECKOUT/activate.sh"
        run_cmd="$run_cmd && cd $GITHUB_WORKSPACE/$PYPTO_SERVING_CHECKOUT"
        run_cmd="$run_cmd && TASK_DEVICE=\$TASK_DEVICE"
        run_cmd="$run_cmd PYTHONPATH=$GITHUB_WORKSPACE/$PYPTO_SERVING_CHECKOUT"
        run_cmd="$run_cmd PYPTO_DSV4_MODEL_DIR=$PYPTO_DSV4_MODEL_DIR"
        run_cmd="$run_cmd PYPTO_RUNTIME_LOG=$PYPTO_RUNTIME_LOG"
        run_cmd="$run_cmd PTO2_RING_DEP_POOL=$PTO2_RING_DEP_POOL"
        run_cmd="$run_cmd PTO2_RING_TASK_WINDOW=$PTO2_RING_TASK_WINDOW"
        run_cmd="$run_cmd PTO2_RING_HEAP=$PTO2_RING_HEAP"
        run_cmd="$run_cmd PTO2_OP_EXECUTE_TIMEOUT_US=$PTO2_OP_EXECUTE_TIMEOUT_US"
        run_cmd="$run_cmd PTO2_STREAM_SYNC_TIMEOUT_MS=$PTO2_STREAM_SYNC_TIMEOUT_MS"
        run_cmd="$run_cmd PTO2_SCHEDULER_TIMEOUT_MS=$PTO2_SCHEDULER_TIMEOUT_MS"
        run_cmd="$run_cmd SERVING_WORKER_STEP_TIMEOUT=$SERVING_WORKER_STEP_TIMEOUT"
        run_cmd="$run_cmd python -m pytest tests/test_deepseek_v4_accuracy.py -q -s"
        task-submit --device auto --device-num 8 --ignore-whitelist \
          --timeout 3600 --max-time 1800 \
          --run "$run_cmd"
