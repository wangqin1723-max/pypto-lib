name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: pre-commit/action@v3.0.0
        with:
          extra_args: --all-files

  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-unit-tests
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Run golden unit tests
        run: pytest tests/golden -v

  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
      files: ${{ steps.check.outputs.files }}
      run_serving_tests: ${{ steps.check.outputs.run_serving_tests }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - id: check
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "files=" >> "$GITHUB_OUTPUT"
            # serving is a PR-only job (see its `if`), so never arm it here.
            echo "run_serving_tests=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CHANGED_FILES=$(git diff --name-only \
            ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }})
          # Map the raw diff to the runnable scripts CI must exercise:
          #  - a changed models/ source file selects every runnable file that
          #    (transitively) imports it, not just the file itself;
          #  - any change outside models/ (golden/, .github/, docs, examples, …)
          #    selects all runnable examples as a smoke test.
          # See .github/scripts/detect_changes.py for the rules.
          FILES=$(printf '%s\n' "$CHANGED_FILES" | python .github/scripts/detect_changes.py)
          if [ -n "$FILES" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          # pypto-serving e2e only exercises Qwen3-14B (tests/test_qwen3_accuracy.py
          # against the Qwen3-14B checkpoint), so only a qwen3-14b source change can
          # affect it. CI-infra edits (.github/**) must not trigger this expensive job.
          if printf '%s\n' "$CHANGED_FILES" | grep -qE '^models/qwen3/14b/'; then
            echo "run_serving_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_serving_tests=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Selected files: $FILES"

  sim:
    needs: detect-changes
    if: github.event_name != 'pull_request' || needs.detect-changes.outputs.has_changes == 'true'
    # Simulator job: no device needed, so it runs on the CPU runner inside the
    # ci-py310 container (mirrors pypto's codegen-tests setup, registry on port
    # 5001). pypto/ptoas/pto-isa are installed by the setup-sim-job composite,
    # exactly like the on-device a2a3 job — only the runner label and the lack of
    # Ascend host env differ.
    runs-on: [self-hosted, linux, arm64, cpu]
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        platform: [a2a3sim, a5sim]
    env:
      PTOAS_ROOT: ${{ github.workspace }}/ptoas-bin
      PTO_ISA_ROOT: ${{ github.workspace }}/pto-isa
      CMAKE_BUILD_PARALLEL_LEVEL: 16
      CMAKE_C_COMPILER_LAUNCHER: ccache
      CMAKE_CXX_COMPILER_LAUNCHER: ccache
      CCACHE_DIR: /root/.cache/ccache
      CCACHE_MAXSIZE: 30G
      # Shared with the host-side a2a3 job (ci-runner) via the ci-cache mount;
      # 000 keeps every cache file group/world-writable so root (this container)
      # and ci-runner can both update and LRU-evict each other's entries.
      CCACHE_UMASK: '000'
      PIP_CACHE_DIR: /root/.cache/pip
    container:
      image: localhost:5001/ci-py310:latest
      # GitHub Actions containers do not inherit the host's large /dev/shm; they
      # use Docker's 64MB default. Distributed example kernels call torch
      # share_memory_() and overflow it. --shm-size gives each container its own
      # tmpfs (sized on demand, not pre-allocated), avoiding the --ipc=host name
      # clashes between the concurrent cpu-1..4 runners.
      options: >-
        --shm-size=128g
        -v /home/ci-runner/hw-native-sys-pypto-lib/ci-cache/pip-sim:/root/.cache/pip
        -v /home/ci-runner/hw-native-sys-pypto-lib/ci-cache/ccache:/root/.cache/ccache
        -v /home/ci-runner/hw-native-sys-pypto-lib/ci-cache/ptoas:/opt/ptoas-cache
        -v /home/ci-runner/hw-native-sys-pypto-lib/ci-cache/pypto-src-${{ matrix.platform }}:/opt/pypto-src

    steps:
      - name: Checkout pypto-lib
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup simulator job
        uses: ./.github/actions/setup-sim-job

      - name: Run ${{ matrix.platform }} tests
        shell: bash
        env:
          PYTHONPATH: ${{ github.workspace }}
          PTO2_RING_DEP_POOL: 16384
          PTO2_RING_TASK_WINDOW: 16384
          PTO2_RING_HEAP: 1073741824
        run: |
          set +e
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES="${{ needs.detect-changes.outputs.files }}"
          else
            FILES=$(find examples -name '*.py' ! -name '*draft*' | sort)
          fi
          if [ -z "$FILES" ]; then
            echo "No runnable changed files; nothing to test."
            exit 0
          fi
          failed=()
          for f in $FILES; do
            echo "::group::$f"
            # Files marked `# ci: no-sim` (full multi-layer / multi-card
            # forwards) are device-only and would just argparse-reject *sim.
            if grep -qE '^#\s*ci:\s*no-sim' "$f"; then
              echo "skip (no-sim): $f"
              echo "::endgroup::"
              continue
            fi
            if ! python "$f" -p ${{ matrix.platform }}; then
              failed+=("$f")
              echo "::error file=${f}::FAIL"
            fi
            echo "::endgroup::"
          done
          if [ ${#failed[@]} -ne 0 ]; then
            printf 'FAILED: %s\n' "${failed[@]}"
            exit 1
          fi
          echo "All selected files passed."

      - name: Clean up build artifacts
        if: always()
        run: rm -rf build_output

  a2a3:
    needs: detect-changes
    if: github.event_name != 'pull_request' || needs.detect-changes.outputs.has_changes == 'true'
    # No container: multi-card kernels use HCCL, which needs a host-only env
    # (set_env.sh, HCCL plugin paths) — in docker the chip child silent-crashes
    # in comm_init. So this job runs directly on the host like pypto's
    # dist-system-tests. It holds NO card: every device run is wrapped in
    # `task-submit --device "$DEVICE_ID"` (mechanism B), which borrows a card
    # (or an N-card set for the multi-card `# ci: devices=N` files) from the
    # host-level device queue and passes the lent set as $TASK_DEVICE. The
    # backend controls whether DEVICE_ID is `auto` (borrow any free card) or a
    # fixed card id. Checkout / install happen under ./dist-checkout to avoid
    # colliding with any container-owned workspace left on the shared runner.
    runs-on: [self-hosted, linux, arm64, npu]
    timeout-minutes: 60
    defaults:
      run:
        working-directory: dist-checkout
    env:
      ASCEND_HOME_PATH: /usr/local/Ascend/cann-9.0.0
      PTOAS_ROOT: ${{ github.workspace }}/dist-checkout/ptoas-bin
      PTO_ISA_ROOT: ${{ github.workspace }}/dist-checkout/pto-isa
      CMAKE_BUILD_PARALLEL_LEVEL: 16
      CMAKE_C_COMPILER_LAUNCHER: ccache
      CMAKE_CXX_COMPILER_LAUNCHER: ccache
      CCACHE_DIR: /home/ci-runner/hw-native-sys-pypto-lib/ci-cache/ccache
      CCACHE_MAXSIZE: 30G
      # Shared with the container-side sim job (root) via the same ci-cache dir;
      # 000 keeps cache files mutually writable across root and ci-runner.
      CCACHE_UMASK: '000'
      # Per-job pip dir: unlike ccache, pip has no shared-umask knob, so a shared
      # pip cache would leave files owned by whichever job wrote first and block
      # the other. The sim job uses ci-cache/pip-sim (see its bind mount).
      PIP_CACHE_DIR: /home/ci-runner/hw-native-sys-pypto-lib/ci-cache/pip-a2a3

    steps:
      - name: Fetch composite action definitions
        # Local `uses: ./.github/actions/...` resolves against $GITHUB_WORKSPACE,
        # but this job checks the repo out into ./dist-checkout — sparse-fetch just
        # the action defs at the workspace root first (clean: false leaves sibling
        # subdir checkouts on this persistent runner untouched).
        uses: actions/checkout@v4
        with:
          sparse-checkout: .github/actions
          clean: false
          persist-credentials: false

      - name: Setup NPU device job
        uses: ./.github/actions/setup-npu-device-job
        with:
          checkout-path: dist-checkout
          build-namespace: a2a3

      - name: Run a2a3 tests (via task-submit)
        shell: bash
        env:
          PTO2_RING_DEP_POOL: 16384
          PTO2_RING_TASK_WINDOW: 16384
          PTO2_RING_HEAP: 1073741824
        run: |
          source activate.sh
          set +e
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES="${{ needs.detect-changes.outputs.files }}"
          else
            FILES=$(find examples -name '*.py' ! -name '*draft*' | sort)
          fi
          if [ -z "$FILES" ]; then
            echo "No runnable changed files; nothing to test."
            exit 0
          fi
          failed=()
          for f in $FILES; do
            echo "::group::$f"
            # Files needing multiple NPUs declare `# ci: devices=N` (N>1) near
            # the top; borrow that many cards with `--device-num N` (defaults to
            # ep2 / 2-card runs). $TASK_DEVICE is the lent set (a single id, or
            # comma-separated for N>1) and is passed straight to -d; the ring env
            # above is preserved into the child. Higher world sizes (ep4/ep8) are
            # exercised as explicit --device-num 4/8 steps in daily_ci.yml.
            ndev=$(grep -oP '#\s*ci:\s*devices=\K[0-9]+' "$f" | head -1)
            ndev=${ndev:-1}
            devnum_flag=""
            [ "$ndev" -gt 1 ] && devnum_flag="--device-num $ndev"
            task-submit --device "$DEVICE_ID" $devnum_flag --timeout 1800 --max-time 600 \
              --run "cd $GITHUB_WORKSPACE/dist-checkout && source activate.sh && PYTHONPATH=$GITHUB_WORKSPACE/dist-checkout python $f -p a2a3 -d \$TASK_DEVICE"
            if [ $? -ne 0 ]; then
              failed+=("$f")
              echo "::error file=${f}::FAIL"
            fi
            echo "::endgroup::"
          done
          if [ ${#failed[@]} -ne 0 ]; then
            printf 'FAILED: %s\n' "${failed[@]}"
            exit 1
          fi
          echo "All selected files passed."

      - name: Kill orphaned task-submit tasks
        if: always()
        uses: ./.github/actions/kill-orphaned-tasks
        with:
          checkout-path: dist-checkout

      - name: Clean up build artifacts
        if: always()
        working-directory: dist-checkout
        run: rm -rf build_output

  serving-qwen3-14b:
    needs: detect-changes
    # PR-only: push/dispatch never run the (expensive) qwen3-14b serving e2e.
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.run_serving_tests == 'true'
    runs-on: [self-hosted, linux, arm64, npu]
    timeout-minutes: 60
    env:
      ASCEND_HOME_PATH: /usr/local/Ascend/cann-9.0.0
      PTOAS_ROOT: ${{ github.workspace }}/dist-checkout/ptoas-bin
      PTO_ISA_ROOT: ${{ github.workspace }}/dist-checkout/pto-isa
      CMAKE_BUILD_PARALLEL_LEVEL: 16
      CMAKE_C_COMPILER_LAUNCHER: ccache
      CMAKE_CXX_COMPILER_LAUNCHER: ccache
      CCACHE_DIR: /home/ci-runner/hw-native-sys-pypto-lib/ci-cache/ccache-serving
      CCACHE_MAXSIZE: 30G
      CCACHE_UMASK: '000'
      PIP_CACHE_DIR: /home/ci-runner/hw-native-sys-pypto-lib/ci-cache/pip-serving

    steps:
      - name: Fetch composite action definitions
        uses: actions/checkout@v4
        with:
          sparse-checkout: .github/actions
          clean: false
          persist-credentials: false

      - name: Setup NPU device job
        uses: ./.github/actions/setup-npu-device-job
        with:
          checkout-path: dist-checkout
          build-namespace: serving

      - name: Run pypto-serving e2e model tests
        uses: ./.github/actions/pypto-serving-tests
        with:
          pypto-lib-checkout-path: dist-checkout
          pypto-serving-checkout-path: serving-checkout
          model-dir: /data/l00955553/model/Qwen3-14B

      - name: Kill orphaned task-submit tasks
        if: always()
        uses: ./.github/actions/kill-orphaned-tasks
        with:
          checkout-path: dist-checkout

      - name: Clean up build artifacts
        if: always()
        run: rm -rf dist-checkout/build_output serving-checkout/build_output serving-checkout/pypto-lib/build_output
