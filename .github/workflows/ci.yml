name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: pre-commit/action@v3.0.0
        with:
          extra_args: --all-files

  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-unit-tests
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Run golden unit tests
        run: pytest tests/golden -v

  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
      files: ${{ steps.check.outputs.files }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: check
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "files=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CHANGED=$(git diff --name-only \
            ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }} \
            | grep -E '^(examples|models)/.*\.py$' | grep -v draft || true)
          FILES=""
          for f in $CHANGED; do
            [ -f "$f" ] || continue
            grep -q '__main__' "$f" && FILES="$FILES $f"
          done
          FILES=$(echo $FILES | xargs)
          if [ -n "$FILES" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          echo "Selected files: $FILES"

  sim:
    needs: detect-changes
    if: github.event_name != 'pull_request' || needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        platform: [a2a3sim, a5sim]
    env:
      PTOAS_ROOT: ${{ github.workspace }}/ptoas-bin
      PTOAS_VERSION: v0.45
      PTOAS_SHA256: 8d1c697e50de238606cec571ee5cdd31e0886476fdf62c4306d2af3bedca16b8
      PTO_ISA_ROOT: ${{ github.workspace }}/pto-isa
      PTO_ISA_COMMIT: b9122ec586b5a7b4b686ca7498874a1c94b3573c

    steps:
      - name: Checkout pypto-lib
        uses: actions/checkout@v4

      - name: Set up C++ compiler
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y ninja-build
          sudo apt-get install -y g++-15 || sudo apt-get install -y g++
          if ! command -v g++-15; then sudo ln -s $(which g++) /usr/local/bin/g++-15; fi

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nanobind
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Get pypto HEAD commit
        id: pypto-hash
        run: echo "hash=$(git ls-remote https://github.com/hw-native-sys/pypto.git HEAD | cut -f1)" >> $GITHUB_OUTPUT

      - name: Cache pypto wheels
        id: cache-pypto
        uses: actions/cache@v4
        with:
          path: /tmp/pypto-wheels
          key: pypto-${{ runner.os }}-${{ runner.arch }}-py3.10-${{ steps.pypto-hash.outputs.hash }}

      - name: Build pypto wheels
        if: steps.cache-pypto.outputs.cache-hit != 'true'
        run: |
          git clone --recurse-submodules --depth=1 https://github.com/hw-native-sys/pypto.git /tmp/pypto
          pip wheel /tmp/pypto -w /tmp/pypto-wheels --no-deps
          pip wheel /tmp/pypto/runtime -w /tmp/pypto-wheels --no-deps

      - name: Install pypto and simpler
        run: pip install /tmp/pypto-wheels/*.whl

      - name: Cache ptoas binary
        id: cache-ptoas
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/ptoas-bin
          key: ptoas-x86_64-${{ env.PTOAS_VERSION }}-${{ env.PTOAS_SHA256 }}

      - name: Install ptoas
        if: steps.cache-ptoas.outputs.cache-hit != 'true'
        run: |
          curl --fail --location --retry 3 --retry-all-errors \
            https://github.com/hw-native-sys/PTOAS/releases/download/${{ env.PTOAS_VERSION }}/ptoas-bin-x86_64.tar.gz \
            -o /tmp/ptoas-bin-x86_64.tar.gz
          echo "${{ env.PTOAS_SHA256 }}  /tmp/ptoas-bin-x86_64.tar.gz" | sha256sum -c -
          mkdir -p $GITHUB_WORKSPACE/ptoas-bin
          tar -xzf /tmp/ptoas-bin-x86_64.tar.gz -C $GITHUB_WORKSPACE/ptoas-bin
          chmod +x $GITHUB_WORKSPACE/ptoas-bin/ptoas
          chmod +x $GITHUB_WORKSPACE/ptoas-bin/bin/ptoas

      - name: Clone pto-isa repository (pinned)
        run: |
          timeout 60 git clone https://github.com/hw-native-sys/pto-isa.git $GITHUB_WORKSPACE/pto-isa \
            || { rm -rf $GITHUB_WORKSPACE/pto-isa; git clone https://gitcode.com/luohuan40/pto-isa.git $GITHUB_WORKSPACE/pto-isa; }
          cd $GITHUB_WORKSPACE/pto-isa
          git checkout ${{ env.PTO_ISA_COMMIT }}

      - name: Run ${{ matrix.platform }} tests
        shell: bash
        env:
          PYTHONPATH: ${{ github.workspace }}
          PTO2_RING_DEP_POOL: 524288
          PTO2_RING_TASK_WINDOW: 524288
          PTO2_RING_HEAP: 2147483648
        run: |
          set +e
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES="${{ needs.detect-changes.outputs.files }}"
          else
            FILES=$(find examples -name '*.py' ! -name '*draft*' | sort)
          fi
          if [ -z "$FILES" ]; then
            echo "No runnable changed files; nothing to test."
            exit 0
          fi
          failed=()
          for f in $FILES; do
            echo "::group::$f"
            if ! python "$f" -p ${{ matrix.platform }}; then
              failed+=("$f")
              echo "::error file=${f}::FAIL"
            fi
            echo "::endgroup::"
          done
          if [ ${#failed[@]} -ne 0 ]; then
            printf 'FAILED: %s\n' "${failed[@]}"
            exit 1
          fi
          echo "All selected files passed."

      - name: Clean up build artifacts
        if: always()
        run: rm -rf build_output

  a2a3:
    needs: detect-changes
    if: github.event_name != 'pull_request' || needs.detect-changes.outputs.has_changes == 'true'
    # No container: multi-card kernels use HCCL, which needs a host-only env
    # (set_env.sh, HCCL plugin paths) — in docker the chip child silent-crashes
    # in comm_init. So this job runs directly on the host like pypto's
    # dist-system-tests, on a 2-device runner so it can also schedule the
    # multi-card files. Checkout / install happen under ./dist-checkout to avoid
    # colliding with any container-owned workspace left on the shared runner.
    runs-on: [self-hosted, linux, arm64, npu]
    timeout-minutes: 30
    defaults:
      run:
        working-directory: dist-checkout
    env:
      ASCEND_HOME_PATH: /usr/local/Ascend/cann-9.0.0
      PTOAS_ROOT: ${{ github.workspace }}/dist-checkout/ptoas-bin
      PTOAS_VERSION: v0.45
      PTOAS_SHA256: d5e4380df7edd4d3eeb23502d57f923e4c912345eccceb5a9a0ec1aac3b5e7d4
      PTO_ISA_ROOT: ${{ github.workspace }}/dist-checkout/pto-isa
      PTO_ISA_COMMIT: b9122ec586b5a7b4b686ca7498874a1c94b3573c
      CMAKE_BUILD_PARALLEL_LEVEL: 16
      CMAKE_C_COMPILER_LAUNCHER: ccache
      CMAKE_CXX_COMPILER_LAUNCHER: ccache
      CCACHE_DIR: /home/ci-runner/.cache/ccache
      CCACHE_MAXSIZE: 5G
      PIP_CACHE_DIR: /home/ci-runner/.cache/pip

    steps:
      - name: Checkout pypto-lib
        uses: actions/checkout@v4
        with:
          path: dist-checkout
          persist-credentials: false

      - name: Check NPU
        working-directory: .
        run: npu-smi info

      - name: Clone pto-isa repository (pinned)
        run: |
          rm -rf "$PTO_ISA_ROOT"
          timeout 60 git clone https://github.com/hw-native-sys/pto-isa.git "$PTO_ISA_ROOT" \
            || { rm -rf "$PTO_ISA_ROOT"; timeout 300 git clone https://gitcode.com/luohuan40/pto-isa.git "$PTO_ISA_ROOT"; }
          cd "$PTO_ISA_ROOT"
          git checkout ${{ env.PTO_ISA_COMMIT }}

      - name: Bootstrap conda + per-job venv + write activate.sh
        # Per-job venv layered on conda py310-lib; activate.sh lets each later step
        # enter the env with a single `source activate.sh`. set_env.sh wires up
        # the Ascend/HCCL host environment; LD_LIBRARY_PATH is prepended with
        # $CONDA_PREFIX/lib because ptoas needs a newer GLIBCXX than the system.
        # PTO2_RING_* (set by the runner's systemd) are handled per-file in the
        # run step — they break HCCL, so multi-card files unset them there.
        run: |
          source /home/ci-runner/miniconda3/etc/profile.d/conda.sh
          conda activate py310-lib
          python -m venv venv --system-site-packages
          cat > activate.sh <<'EOF'
          source /home/ci-runner/miniconda3/etc/profile.d/conda.sh
          conda activate py310-lib
          source "$GITHUB_WORKSPACE/dist-checkout/venv/bin/activate"
          source /usr/local/Ascend/cann-9.0.0/set_env.sh
          export LD_LIBRARY_PATH="$CONDA_PREFIX/lib:$LD_LIBRARY_PATH"
          EOF

      - name: Show ccache stats (before)
        run: ccache -s || true

      - name: Sync pypto source (local cache)
        run: |
          source activate.sh
          PYPTO_SRC="/home/ci-runner/hw-native-sys-pypto-lib/ci-cache/pypto-src"
          if [ -d "$PYPTO_SRC/.git" ]; then
            echo "Cache hit — updating pypto"
            git -C "$PYPTO_SRC" fetch --depth=1 origin HEAD
            git -C "$PYPTO_SRC" reset --hard FETCH_HEAD
            git -C "$PYPTO_SRC" clean -ffdx
            git -C "$PYPTO_SRC" submodule foreach --recursive 'git reset --hard && git clean -ffdx' || true
          else
            echo "Cache miss — cloning pypto"
            git clone --recurse-submodules --depth=1 https://github.com/hw-native-sys/pypto.git "$PYPTO_SRC"
          fi
          git -C "$PYPTO_SRC" submodule update --init --recursive
          rm -rf "$PYPTO_SRC/build" "$PYPTO_SRC/_skbuild"
          test ! -e "$PYPTO_SRC/build" && test ! -e "$PYPTO_SRC/_skbuild" \
            && echo "OK: pypto build removed" \
            || { echo "FAIL: pypto build dirs still exist"; exit 1; }
          rm -rf "$PYPTO_SRC/runtime/build"
          test ! -e "$PYPTO_SRC/runtime/build" \
            && echo "OK: runtime build removed" \
            || { echo "FAIL: runtime build dir still exists"; exit 1; }
          python -m pip install --upgrade pip
          pip install scikit-build-core nanobind cmake ninja
          pip install --no-build-isolation "$PYPTO_SRC"
          pip install --no-build-isolation "$PYPTO_SRC/runtime"

      - name: Install runner dependencies
        run: |
          source activate.sh
          pip install nanobind
          pip install torch

      - name: Show ccache stats (after)
        run: ccache -s || true

      - name: Install ptoas (local cache)
        env:
          PTOAS_CACHE_DIR: /home/ci-runner/hw-native-sys-pypto-lib/ci-cache/ptoas
        run: |
          CACHE_ARCHIVE="$PTOAS_CACHE_DIR/ptoas-aarch64-${PTOAS_VERSION}-${PTOAS_SHA256}.tar.gz"
          if [ ! -f "$CACHE_ARCHIVE" ]; then
            echo "Cache miss — downloading ptoas ${PTOAS_VERSION}"
            mkdir -p "$PTOAS_CACHE_DIR"
            curl --fail --location --retry 3 --retry-all-errors \
              https://github.com/hw-native-sys/PTOAS/releases/download/${PTOAS_VERSION}/ptoas-bin-aarch64.tar.gz \
              -o "$CACHE_ARCHIVE.tmp"
            echo "${PTOAS_SHA256}  $CACHE_ARCHIVE.tmp" | sha256sum -c -
            mv "$CACHE_ARCHIVE.tmp" "$CACHE_ARCHIVE"
          else
            echo "Cache hit — using $CACHE_ARCHIVE"
            echo "${PTOAS_SHA256}  $CACHE_ARCHIVE" | sha256sum -c -
          fi
          mkdir -p "$PTOAS_ROOT"
          tar -xzf "$CACHE_ARCHIVE" -C "$PTOAS_ROOT"
          chmod +x "$PTOAS_ROOT/ptoas"
          chmod +x "$PTOAS_ROOT/bin/ptoas"

      - name: Run a2a3 tests
        shell: bash
        env:
          PYTHONPATH: ${{ github.workspace }}/dist-checkout
        run: |
          source activate.sh
          set +e
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES="${{ needs.detect-changes.outputs.files }}"
          else
            FILES=$(find examples -name '*.py' ! -name '*draft*' | sort)
          fi
          if [ -z "$FILES" ]; then
            echo "No runnable changed files; nothing to test."
            exit 0
          fi
          failed=()
          for f in $FILES; do
            echo "::group::$f"
            # Files needing multiple NPUs declare `# ci: devices=N` (N>1) near the
            # top. Multi-card uses HCCL, which breaks when PTO2_RING_* (set by the
            # runner's systemd) are present — so multi-card files run with
            # $DEVICE_RANGE and PTO2_RING_* unset, while single-card files keep the
            # single id and the large ring sizes. Each runs in its own subshell so
            # the env overrides don't leak across files.
            ndev=$(grep -oP '#\s*ci:\s*devices=\K[0-9]+' "$f" | head -1)
            ndev=${ndev:-1}
            if [ "$ndev" -gt 1 ]; then
              if [ -z "$DEVICE_RANGE" ]; then
                echo "::error file=${f}::needs $ndev devices but DEVICE_RANGE is unset"
                failed+=("$f")
                echo "::endgroup::"
                continue
              fi
              actual_ndev=$(tr ',' '\n' <<<"$DEVICE_RANGE" | sed '/^$/d' | wc -l)
              if [ "$actual_ndev" -lt "$ndev" ]; then
                echo "::error file=${f}::needs $ndev devices but DEVICE_RANGE only provides $actual_ndev ($DEVICE_RANGE)"
                failed+=("$f")
                echo "::endgroup::"
                continue
              fi
              ( unset PTO2_RING_HEAP PTO2_RING_TASK_WINDOW PTO2_RING_DEP_POOL
                python "$f" -p a2a3 -d "$(cut -d, -f1-"$ndev" <<<"$DEVICE_RANGE")" )
            else
              ( export PTO2_RING_DEP_POOL=1048576 \
                       PTO2_RING_TASK_WINDOW=1048576 \
                       PTO2_RING_HEAP=4294967296
                python "$f" -p a2a3 -d "$DEVICE_ID" )
            fi
            if [ $? -ne 0 ]; then
              failed+=("$f")
              echo "::error file=${f}::FAIL"
            fi
            echo "::endgroup::"
          done
          if [ ${#failed[@]} -ne 0 ]; then
            printf 'FAILED: %s\n' "${failed[@]}"
            exit 1
          fi
          echo "All selected files passed."

      - name: Clean up build artifacts
        if: always()
        run: rm -rf build_output
