name: Daily CI

on:
  schedule:
    - cron: '0 21 * * *'  # UTC 21:00 = Shanghai 05:00
  workflow_dispatch:

jobs:
  model-tests-sim:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        platform: [a2a3sim, a5sim]
    env:
      PTOAS_ROOT: ${{ github.workspace }}/ptoas-bin
      PTOAS_VERSION: v0.36
      PTOAS_SHA256: 07bfedea5a9ba70266925ead70d87d129fc143f4e9ea280651d28cb2942a1055
      PTO_ISA_ROOT: ${{ github.workspace }}/pto-isa
      PTO_ISA_COMMIT: 0a1ce522

    steps:
      - name: Checkout pypto-lib
        uses: actions/checkout@v4

      - name: Set up C++ compiler
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y ninja-build
          sudo apt-get install -y g++-15 || sudo apt-get install -y g++
          if ! command -v g++-15; then sudo ln -s $(which g++) /usr/local/bin/g++-15; fi

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nanobind
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Build and install pypto and simpler
        run: |
          git clone --recurse-submodules --depth=1 https://github.com/hw-native-sys/pypto.git /tmp/pypto
          pip install /tmp/pypto
          pip install /tmp/pypto/runtime

      - name: Cache ptoas binary
        id: cache-ptoas
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/ptoas-bin
          key: ptoas-x86_64-${{ env.PTOAS_VERSION }}-${{ env.PTOAS_SHA256 }}

      - name: Install ptoas
        if: steps.cache-ptoas.outputs.cache-hit != 'true'
        run: |
          curl --fail --location --retry 3 --retry-all-errors \
            https://github.com/hw-native-sys/PTOAS/releases/download/${{ env.PTOAS_VERSION }}/ptoas-bin-x86_64.tar.gz \
            -o /tmp/ptoas-bin-x86_64.tar.gz
          echo "${{ env.PTOAS_SHA256 }}  /tmp/ptoas-bin-x86_64.tar.gz" | sha256sum -c -
          mkdir -p $GITHUB_WORKSPACE/ptoas-bin
          tar -xzf /tmp/ptoas-bin-x86_64.tar.gz -C $GITHUB_WORKSPACE/ptoas-bin
          chmod +x $GITHUB_WORKSPACE/ptoas-bin/ptoas
          chmod +x $GITHUB_WORKSPACE/ptoas-bin/bin/ptoas

      - name: Clone pto-isa repository (pinned)
        run: |
          timeout 60 git clone https://github.com/hw-native-sys/pto-isa.git $GITHUB_WORKSPACE/pto-isa \
            || { rm -rf $GITHUB_WORKSPACE/pto-isa; git clone https://gitcode.com/luohuan40/pto-isa.git $GITHUB_WORKSPACE/pto-isa; }
          cd $GITHUB_WORKSPACE/pto-isa
          git checkout ${{ env.PTO_ISA_COMMIT }}

      - name: Run model tests (${{ matrix.platform }})
        env:
          PYTHONPATH: ${{ github.workspace }}
          PTO2_RING_DEP_POOL: 1048576
          PTO2_RING_TASK_WINDOW: 1048576
          PTO2_RING_HEAP: 4294967296
          PYPTO_LOG_LEVEL: error
          PYPTO_WARNING_LEVEL: none
        run: |
          : > results.tsv
          failed=""
          for f in $(find models -name '*.py' ! -name '*draft*' | sort); do
            echo "::group::$f"
            if ! timeout --kill-after=10s 300s python "$f" -p ${{ matrix.platform }}; then
              failed="$failed $f"
              echo "::error file=$f::FAIL"
              printf '%s\tfail\n' "$f" >> results.tsv
            else
              printf '%s\tpass\n' "$f" >> results.tsv
            fi
            echo "::endgroup::"
          done
          # Extra dynamic-batch coverage for qwen3-14b-decode (default loop above
          # already exercises batch=16; re-run with batch=1 and batch=20 to make
          # sure a single compiled program serves arbitrary user_batch values).
          QWEN3_14B="models/qwen3/14b/qwen3_14b_decode.py"
          for B in 1 20; do
            case_name="${QWEN3_14B}[batch=${B}]"
            echo "::group::${case_name}"
            if ! timeout --kill-after=10s 600s python "${QWEN3_14B}" -p ${{ matrix.platform }} --batch "${B}"; then
              failed="$failed ${case_name}"
              echo "::error file=${QWEN3_14B}::FAIL (batch=${B})"
              printf '%s\tfail\n' "${case_name}" >> results.tsv
            else
              printf '%s\tpass\n' "${case_name}" >> results.tsv
            fi
            echo "::endgroup::"
          done
          # Layer-count sweep for qwen3-14b-decode_full: 1L is strict (catches
          # single-layer kernel regressions), 10L medium, 40L permissive (the
          # default --num-layers covers 40L via the `find models` loop above).
          # Tighter pass_rate on small layer counts catches systematic bias
          # before it gets diluted by the multi-layer average.
          QWEN3_14B_FULL="models/qwen3/14b/qwen3_14b_decode_full.py"
          for spec in "1:1.0" "10:0.999"; do
            N="${spec%%:*}"; PR="${spec##*:}"
            case_name="${QWEN3_14B_FULL}[num_layers=${N},pass_rate=${PR}]"
            echo "::group::${case_name}"
            if ! timeout --kill-after=10s 600s python "${QWEN3_14B_FULL}" \
                -p ${{ matrix.platform }} --num-layers "${N}" --pass-rate "${PR}"; then
              failed="$failed ${case_name}"
              echo "::error file=${QWEN3_14B_FULL}::FAIL (num_layers=${N}, pass_rate=${PR})"
              printf '%s\tfail\n' "${case_name}" >> results.tsv
            else
              printf '%s\tpass\n' "${case_name}" >> results.tsv
            fi
            echo "::endgroup::"
          done
          if [ -n "$failed" ]; then
            echo "Failed cases:"
            for f in $failed; do echo "  - $f"; done
            exit 1
          fi
          echo "All model tests passed."

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.platform }}
          path: results.tsv

  model-tests-a2a3:
    runs-on: [self-hosted, linux, arm64, npu]
    timeout-minutes: 60
    concurrency:
      group: a2a3-serial
      cancel-in-progress: false
    env:
      ASCEND_HOME_PATH: /usr/local/Ascend/cann-8.5.0
      PTOAS_ROOT: ${{ github.workspace }}/ptoas-bin
      PTOAS_VERSION: v0.36
      PTOAS_SHA256: 698f753b67ca4387e2e4ef96dfdbb35d71295e94f9f5b20a545b34647f548efc
      PTO_ISA_ROOT: ${{ github.workspace }}/pto-isa
      PTO_ISA_COMMIT: 0a1ce522
      CMAKE_BUILD_PARALLEL_LEVEL: 16
      CMAKE_C_COMPILER_LAUNCHER: ccache
      CMAKE_CXX_COMPILER_LAUNCHER: ccache
      CCACHE_DIR: /root/.cache/ccache
      CCACHE_MAXSIZE: 5G
      PIP_CACHE_DIR: /root/.cache/pip
    container:
      image: localhost:5001/ci-device-py310:latest
      options: >-
        --privileged
        -v /usr/local/bin/npu-smi:/usr/local/bin/npu-smi:ro
        -v /usr/local/Ascend:/usr/local/Ascend:ro
        -v /dev:/dev
        -v /home/ci-runner/hw-native-sys-pypto-lib/ci-cache/pip:/root/.cache/pip
        -v /home/ci-runner/hw-native-sys-pypto-lib/ci-cache/ccache:/root/.cache/ccache
        -v /home/ci-runner/hw-native-sys-pypto-lib/ci-cache/ptoas:/opt/ptoas-cache
        -v /home/ci-runner/hw-native-sys-pypto-lib/ci-cache/pypto-src:/opt/pypto-src
        -e ASCEND_HOME_PATH=/usr/local/Ascend/cann-8.5.0
        -e DEVICE_ID

    steps:
      - name: Checkout pypto-lib
        uses: actions/checkout@v4

      - name: Check NPU
        run: npu-smi info

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nanobind
          pip install torch

      - name: Add Ascend tools to PATH
        run: echo "$ASCEND_HOME_PATH/bin" >> $GITHUB_PATH

      - name: Show ccache stats (before)
        run: ccache -s || true

      - name: Sync pypto source (local cache)
        run: |
          PYPTO_SRC="/opt/pypto-src"
          if [ -d "$PYPTO_SRC/.git" ]; then
            echo "Cache hit — updating pypto"
            git -C "$PYPTO_SRC" fetch --depth=1 origin HEAD
            git -C "$PYPTO_SRC" reset --hard FETCH_HEAD
            git -C "$PYPTO_SRC" clean -ffdx
            git -C "$PYPTO_SRC" submodule foreach --recursive 'git reset --hard && git clean -ffdx' || true
          else
            echo "Cache miss — cloning pypto"
            git clone --recurse-submodules --depth=1 https://github.com/hw-native-sys/pypto.git "$PYPTO_SRC"
          fi
          git -C "$PYPTO_SRC" submodule update --init --recursive
          rm -rf "$PYPTO_SRC/build" "$PYPTO_SRC/_skbuild"
          test ! -e "$PYPTO_SRC/build" && test ! -e "$PYPTO_SRC/_skbuild" \
            && echo "OK: pypto build removed" \
            || { echo "FAIL: pypto build dirs still exist"; exit 1; }
          rm -rf "$PYPTO_SRC/runtime/build"
          test ! -e "$PYPTO_SRC/runtime/build" \
            && echo "OK: runtime build removed" \
            || { echo "FAIL: runtime build dir still exists"; exit 1; }
          pip install --no-build-isolation "$PYPTO_SRC"
          pip install --no-build-isolation "$PYPTO_SRC/runtime"

      - name: Show ccache stats (after)
        run: ccache -s || true

      - name: Install ptoas (local cache)
        env:
          PTOAS_CACHE_DIR: /opt/ptoas-cache
        run: |
          CACHE_ARCHIVE="$PTOAS_CACHE_DIR/ptoas-aarch64-${PTOAS_VERSION}-${PTOAS_SHA256}.tar.gz"
          if [ ! -f "$CACHE_ARCHIVE" ]; then
            echo "Cache miss — downloading ptoas ${PTOAS_VERSION}"
            mkdir -p "$PTOAS_CACHE_DIR"
            curl --fail --location --retry 3 --retry-all-errors \
              https://github.com/hw-native-sys/PTOAS/releases/download/${PTOAS_VERSION}/ptoas-bin-aarch64.tar.gz \
              -o "$CACHE_ARCHIVE.tmp"
            echo "${PTOAS_SHA256}  $CACHE_ARCHIVE.tmp" | sha256sum -c -
            mv "$CACHE_ARCHIVE.tmp" "$CACHE_ARCHIVE"
          else
            echo "Cache hit — using $CACHE_ARCHIVE"
            echo "${PTOAS_SHA256}  $CACHE_ARCHIVE" | sha256sum -c -
          fi
          mkdir -p "$GITHUB_WORKSPACE/ptoas-bin"
          tar -xzf "$CACHE_ARCHIVE" -C "$GITHUB_WORKSPACE/ptoas-bin"
          chmod +x "$GITHUB_WORKSPACE/ptoas-bin/ptoas"
          chmod +x "$GITHUB_WORKSPACE/ptoas-bin/bin/ptoas"

      - name: Clone pto-isa repository (pinned)
        run: |
          timeout 60 git clone https://github.com/hw-native-sys/pto-isa.git $GITHUB_WORKSPACE/pto-isa \
            || { rm -rf $GITHUB_WORKSPACE/pto-isa; git clone https://gitcode.com/luohuan40/pto-isa.git $GITHUB_WORKSPACE/pto-isa; }
          cd $GITHUB_WORKSPACE/pto-isa
          git checkout ${{ env.PTO_ISA_COMMIT }}

      - name: Run model tests (a2a3)
        env:
          PYTHONPATH: ${{ github.workspace }}
          PTO2_RING_DEP_POOL: 1048576
          PTO2_RING_TASK_WINDOW: 1048576
          PTO2_RING_HEAP: 4294967296
          PYPTO_LOG_LEVEL: error
          PYPTO_WARNING_LEVEL: none
        run: |
          : > results.tsv
          failed=""
          for f in $(find models -name '*.py' ! -name '*draft*' | sort); do
            echo "::group::$f"
            if ! timeout --kill-after=10s 300s python "$f" -p a2a3 -d $DEVICE_ID; then
              failed="$failed $f"
              echo "::error file=$f::FAIL"
              printf '%s\tfail\n' "$f" >> results.tsv
            else
              printf '%s\tpass\n' "$f" >> results.tsv
            fi
            echo "::endgroup::"
          done
          # Extra dynamic-batch coverage for qwen3-14b-decode (default loop above
          # already exercises batch=16; re-run with batch=1 and batch=20 to make
          # sure a single compiled program serves arbitrary user_batch values).
          QWEN3_14B="models/qwen3/14b/qwen3_14b_decode.py"
          for B in 1 20; do
            case_name="${QWEN3_14B}[batch=${B}]"
            echo "::group::${case_name}"
            if ! timeout --kill-after=10s 600s python "${QWEN3_14B}" -p a2a3 -d $DEVICE_ID --batch "${B}"; then
              failed="$failed ${case_name}"
              echo "::error file=${QWEN3_14B}::FAIL (batch=${B})"
              printf '%s\tfail\n' "${case_name}" >> results.tsv
            else
              printf '%s\tpass\n' "${case_name}" >> results.tsv
            fi
            echo "::endgroup::"
          done
          # Layer-count sweep for qwen3-14b-decode_full: 1L is strict (catches
          # single-layer kernel regressions), 10L medium, 40L permissive (the
          # default --num-layers covers 40L via the `find models` loop above).
          # Tighter pass_rate on small layer counts catches systematic bias
          # before it gets diluted by the multi-layer average.
          QWEN3_14B_FULL="models/qwen3/14b/qwen3_14b_decode_full.py"
          for spec in "1:1.0" "10:0.999"; do
            N="${spec%%:*}"; PR="${spec##*:}"
            case_name="${QWEN3_14B_FULL}[num_layers=${N},pass_rate=${PR}]"
            echo "::group::${case_name}"
            if ! timeout --kill-after=10s 600s python "${QWEN3_14B_FULL}" \
                -p a2a3 -d $DEVICE_ID --num-layers "${N}" --pass-rate "${PR}"; then
              failed="$failed ${case_name}"
              echo "::error file=${QWEN3_14B_FULL}::FAIL (num_layers=${N}, pass_rate=${PR})"
              printf '%s\tfail\n' "${case_name}" >> results.tsv
            else
              printf '%s\tpass\n' "${case_name}" >> results.tsv
            fi
            echo "::endgroup::"
          done
          if [ -n "$failed" ]; then
            echo "Failed cases:"
            for f in $failed; do echo "  - $f"; done
            exit 1
          fi
          echo "All model tests passed."

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-a2a3
          path: results.tsv

  summary:
    name: Aggregate results summary
    needs: [model-tests-sim, model-tests-a2a3]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: results

      - name: Build combined summary table
        run: |
          python3 - <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          import pathlib

          PLATFORMS = ["a2a3", "a2a3sim", "a5sim"]
          ICON = {"pass": ":white_check_mark:", "fail": ":x:", "missing": ":heavy_minus_sign:"}

          results = {p: {} for p in PLATFORMS}
          root = pathlib.Path("results")
          for p in PLATFORMS:
              tsv = root / f"results-{p}" / "results.tsv"
              if not tsv.exists():
                  continue
              for line in tsv.read_text().splitlines():
                  if not line.strip():
                      continue
                  case, status = line.split("\t", 1)
                  results[p][case] = status

          all_cases = sorted({c for p in PLATFORMS for c in results[p]})

          print("## Daily CI Model Test Results")
          print()
          print("| Case | " + " | ".join(PLATFORMS) + " |")
          print("| ---- | " + " | ".join(["---"] * len(PLATFORMS)) + " |")
          for case in all_cases:
              cells = [ICON.get(results[p].get(case, "missing"), "?") for p in PLATFORMS]
              print(f"| `{case}` | " + " | ".join(cells) + " |")
          EOF
