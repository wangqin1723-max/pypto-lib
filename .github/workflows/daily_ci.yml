name: Daily CI

on:
  schedule:
    - cron: '0 21 * * *'  # UTC 21:00 = Shanghai 05:00
  workflow_dispatch:

jobs:
  model-tests-sim:
    # Simulator job: no device needed, so it runs on the CPU runner inside the
    # ci-py310 container (mirrors pypto's codegen-tests setup, registry on port
    # 5001). pypto/ptoas/pto-isa are installed by the setup-sim-job composite,
    # exactly like the on-device a2a3 job — only the runner label and the lack of
    # Ascend host env differ.
    runs-on: [self-hosted, linux, arm64, cpu]
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        platform: [a2a3sim, a5sim]
    env:
      PTOAS_ROOT: ${{ github.workspace }}/ptoas-bin
      PTO_ISA_ROOT: ${{ github.workspace }}/pto-isa
      CMAKE_BUILD_PARALLEL_LEVEL: 16
      CMAKE_C_COMPILER_LAUNCHER: ccache
      CMAKE_CXX_COMPILER_LAUNCHER: ccache
      CCACHE_DIR: /root/.cache/ccache
      CCACHE_MAXSIZE: 30G
      # Shared with the host-side a2a3 job (ci-runner) via the ci-cache mount;
      # 000 keeps every cache file group/world-writable so root (this container)
      # and ci-runner can both update and LRU-evict each other's entries.
      CCACHE_UMASK: '000'
      PIP_CACHE_DIR: /root/.cache/pip
    container:
      image: localhost:5001/ci-py310:latest
      # GitHub Actions containers do not inherit the host's large /dev/shm; they
      # use Docker's 64MB default. Distributed model kernels call torch
      # share_memory_() and overflow it. --shm-size gives each container its own
      # tmpfs (sized on demand, not pre-allocated), avoiding the --ipc=host name
      # clashes between the concurrent cpu-1..4 runners.
      options: >-
        --shm-size=128g
        -v /home/ci-runner/hw-native-sys-pypto-lib/ci-cache/pip-sim:/root/.cache/pip
        -v /home/ci-runner/hw-native-sys-pypto-lib/ci-cache/ccache:/root/.cache/ccache
        -v /home/ci-runner/hw-native-sys-pypto-lib/ci-cache/ptoas:/opt/ptoas-cache
        -v /home/ci-runner/hw-native-sys-pypto-lib/ci-cache/pypto-src-${{ matrix.platform }}:/opt/pypto-src

    steps:
      - name: Checkout pypto-lib
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup simulator job
        uses: ./.github/actions/setup-sim-job

      - name: Run model tests (${{ matrix.platform }})
        shell: bash
        env:
          PYTHONPATH: ${{ github.workspace }}
          PTO2_RING_DEP_POOL: 16384
          PTO2_RING_TASK_WINDOW: 16384
          PTO2_RING_HEAP: 1073741824
          PYPTO_LOG_LEVEL: error
          PYPTO_WARNING_LEVEL: none
          # Quiet simpler's runtime logger. On a SIMPLER_PROFILING build every
          # simpler_run emits its [STRACE] timing tree at the INFO_V9 tier, and
          # simpler's logger defaults to INFO — so without this the console floods
          # with markers. PYPTO_LOG_LEVEL/PYPTO_WARNING_LEVEL above drive pypto's
          # own C++ logger, not simpler's; PYPTO_RUNTIME_LOG is simpler's knob.
          # benchmark() still reads timing: it raises this to v9 only around its
          # own fd-captured loop, then restores.
          PYPTO_RUNTIME_LOG: error
        run: |
          : > results.tsv
          failed=()
          run_case() {
            local file="$1" label="$2"; shift 2
            echo "::group::${label}"
            if ! timeout --kill-after=10s 300s python "$file" -p ${{ matrix.platform }} "$@"; then
              failed+=("$label")
              echo "::error file=${file}::FAIL (${label})"
              printf '%s\tfail\n' "$label" >> results.tsv
            else
              printf '%s\tpass\n' "$label" >> results.tsv
            fi
            echo "::endgroup::"
          }
          # Run every model file once with no extra args. Files marked
          # `# ci: no-sim` (full multi-layer / multi-card forwards) are
          # device-only and would just argparse-reject *sim, so skip them here.
          for f in $(find models -name '*.py' ! -name '*draft*' | sort); do
            # Shared modules (config.py, helper libs) have no __main__ guard —
            # they are imported by kernels, not run. Running them import-exits 0
            # and shows a misleading pass, so drop them from the report entirely
            # (matches detect_changes.py's `_has_main` runnable definition).
            if ! grep -q '__main__' "$f"; then
              continue
            fi
            if grep -qE '^#\s*ci:\s*no-sim' "$f"; then
              echo "::group::${f}"
              echo "skip (no-sim): ${f}"
              echo "::endgroup::"
              continue
            fi
            run_case "$f" "$f"
          done
          if [ ${#failed[@]} -ne 0 ]; then
            echo "Failed cases (${#failed[@]}):"
            printf '  - %s\n' "${failed[@]}"
            exit 1
          fi
          echo "All model tests passed."

      - name: Clean up build artifacts
        if: always()
        run: rm -rf build_output

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.platform }}
          path: results.tsv

  model-tests-a2a3:
    # No container: multi-card kernels use HCCL, which needs a host-only env
    # (set_env.sh, HCCL plugin paths) — in docker the chip child silent-crashes
    # in comm_init. So this job runs directly on the host like pypto's
    # dist-system-tests. It holds NO card: every model run is wrapped in
    # `task-submit --device "$DEVICE_ID"` (mechanism B), which borrows a card
    # (or an N-card set for the multi-card `# ci: devices=N` files) from the
    # host-level device queue and passes the lent set as $TASK_DEVICE. The
    # backend controls whether DEVICE_ID is `auto` or a fixed card id. Checkout /
    # install happen under ./dist-checkout to avoid colliding with any
    # container-owned workspace left on the shared runner.
    runs-on: [self-hosted, linux, arm64, npu]
    timeout-minutes: 60
    defaults:
      run:
        working-directory: dist-checkout
    env:
      ASCEND_HOME_PATH: /usr/local/Ascend/cann-9.0.0
      PTOAS_ROOT: ${{ github.workspace }}/dist-checkout/ptoas-bin
      PTO_ISA_ROOT: ${{ github.workspace }}/dist-checkout/pto-isa
      CMAKE_BUILD_PARALLEL_LEVEL: 16
      CMAKE_C_COMPILER_LAUNCHER: ccache
      CMAKE_CXX_COMPILER_LAUNCHER: ccache
      CCACHE_DIR: /home/ci-runner/hw-native-sys-pypto-lib/ci-cache/ccache
      CCACHE_MAXSIZE: 30G
      # Shared with the container-side sim job (root) via the same ci-cache dir;
      # 000 keeps cache files mutually writable across root and ci-runner.
      CCACHE_UMASK: '000'
      # Per-job pip dir: unlike ccache, pip has no shared-umask knob, so a shared
      # pip cache would leave files owned by whichever job wrote first and block
      # the other. The sim job uses ci-cache/pip-sim (see its bind mount).
      PIP_CACHE_DIR: /home/ci-runner/hw-native-sys-pypto-lib/ci-cache/pip-a2a3

    steps:
      - name: Fetch composite action definitions
        # Local `uses: ./.github/actions/...` resolves against $GITHUB_WORKSPACE,
        # but this job checks the repo out into ./dist-checkout — sparse-fetch just
        # the action defs at the workspace root first (clean: false leaves sibling
        # subdir checkouts on this persistent runner untouched).
        uses: actions/checkout@v4
        with:
          sparse-checkout: .github/actions
          clean: false
          persist-credentials: false

      - name: Setup NPU device job
        uses: ./.github/actions/setup-npu-device-job
        with:
          checkout-path: dist-checkout
          build-namespace: a2a3-daily

      - name: Run model tests (a2a3, via task-submit)
        shell: bash
        env:
          PYPTO_LOG_LEVEL: error
          PYPTO_WARNING_LEVEL: none
          # Quiet simpler's runtime logger — see the sim job for the full note.
          # Without this a SIMPLER_PROFILING build floods the log with [STRACE]
          # INFO_V9 markers on every dispatch (correctness runs included, not just
          # benchmark's own fd-captured loop). benchmark() still reads timing.
          PYPTO_RUNTIME_LOG: error
          PYPTO_BENCH: '1'
          PTO2_RING_DEP_POOL: 16384
          PTO2_RING_TASK_WINDOW: 16384
          PTO2_RING_HEAP: 1073741824
        run: |
          source activate.sh
          set +e
          : > results.tsv
          failed=()
          # Perf number per case, from the headline `effective_us` line: L2
          # reports the mean Effective window; L3 (multi-card) reports the min —
          # the fastest round (best-of-N), which filters out cross-rank scheduling
          # jitter since each round is already a max across ranks. L3 is detected
          # by the `l3=1` / `l3_resident=1` marker its benchmark emits. The
          # per-rank breakdown lines use an `eff_us` token (not `effective_us`),
          # so neither grep ever matches them.
          extract_perf() {
            local out; out=$(cat)
            if printf '%s' "$out" | grep -qE 'l3=1|l3_resident=1'; then
              printf '%s' "$out" | grep -oP 'effective_us .*min=\K[0-9.]+' | tail -1
            else
              printf '%s' "$out" | grep -oP 'effective_us .*mean=\K[0-9.]+' | tail -1
            fi
          }
          run_case() {
            local file="$1" label="$2"; shift 2
            echo "::group::${label}"
            # Files needing multiple NPUs declare `# ci: devices=N` (N>1) near
            # the top; borrow that many cards with `--device-num N` (defaults to
            # ep2 / 2-card runs). $TASK_DEVICE is the lent set (a single id, or
            # comma-separated for N>1) and is passed straight to -d. The child's
            # stdout is captured (not streamed) so the perf line can be parsed;
            # the ring env above is preserved into the child.
            local ndev devnum_flag out rc perf
            ndev=$(grep -oP '#\s*ci:\s*devices=\K[0-9]+' "$file" | head -1)
            ndev=${ndev:-1}
            devnum_flag=""
            [ "$ndev" -gt 1 ] && devnum_flag="--device-num $ndev"
            out=$( task-submit --device "$DEVICE_ID" $devnum_flag --timeout 1800 --max-time 900 \
              --run "cd $GITHUB_WORKSPACE/dist-checkout && source activate.sh && PYTHONPATH=$GITHUB_WORKSPACE/dist-checkout python $file -p a2a3 -d \$TASK_DEVICE $*" 2>&1 )
            rc=$?
            printf '%s\n' "$out"
            perf=$(printf '%s\n' "$out" | extract_perf)
            perf=${perf:--}
            if [ "$rc" -ne 0 ]; then
              failed+=("$label")
              echo "::error file=${file}::FAIL (${label})"
              printf '%s\tfail\t%s\n' "$label" "$perf" >> results.tsv
            else
              printf '%s\tpass\t%s\n' "$label" "$perf" >> results.tsv
            fi
            echo "::endgroup::"
          }
          # Run every model file once at its default world size (ep2 / 2-card).
          for f in $(find models -name '*.py' ! -name '*draft*' | sort); do
            # Skip shared modules with no __main__ guard (config.py, helper libs):
            # they are imported, not run, so they don't belong in the report.
            if ! grep -q '__main__' "$f"; then
              continue
            fi
            run_case "$f" "$f"
          done
          # Higher world sizes (ep4/ep8) are added manually as dedicated wraps
          # below — run_case borrows the marker's 2 cards, so ep4/ep8 need their
          # own --device-num (card pool must provide that many cards), e.g.:
          #   task-submit --device "$DEVICE_ID" --device-num 4 --timeout 1800 --max-time 900 \
          #     --run "cd $GITHUB_WORKSPACE/dist-checkout && source activate.sh && \
          #       PYTHONPATH=$GITHUB_WORKSPACE/dist-checkout \
          #       python models/deepseek/v4/moe.py -p a2a3 --ep 4 -d \$TASK_DEVICE"
          if [ ${#failed[@]} -ne 0 ]; then
            echo "Failed cases (${#failed[@]}):"
            printf '  - %s\n' "${failed[@]}"
            exit 1
          fi
          echo "All model tests passed."

      - name: Kill orphaned task-submit tasks
        if: always()
        uses: ./.github/actions/kill-orphaned-tasks
        with:
          checkout-path: dist-checkout

      - name: Clean up build artifacts
        if: always()
        working-directory: dist-checkout
        run: rm -rf build_output

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-a2a3
          path: dist-checkout/results.tsv

  summary:
    name: Aggregate results summary
    needs: [model-tests-sim, model-tests-a2a3]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: results

      - name: Build combined summary table
        run: |
          python3 - <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          import pathlib

          PLATFORMS = ["a2a3", "a2a3sim", "a5sim"]
          ICON = {"pass": ":white_check_mark:", "fail": ":x:", "missing": ":heavy_minus_sign:"}

          results = {p: {} for p in PLATFORMS}
          perf = {}  # case -> a2a3 effective (us): L2 mean, L3 min — see extract_perf
          root = pathlib.Path("results")
          for p in PLATFORMS:
              tsv = root / f"results-{p}" / "results.tsv"
              if not tsv.exists():
                  continue
              for line in tsv.read_text().splitlines():
                  if not line.strip():
                      continue
                  parts = line.split("\t")
                  case, status = parts[0], parts[1]
                  results[p][case] = status
                  if p == "a2a3" and len(parts) >= 3 and parts[2] not in ("", "-"):
                      perf[case] = parts[2]

          all_cases = sorted({c for p in PLATFORMS for c in results[p]})

          print("## Daily CI Model Test Results")
          print()
          print("| Case | a2a3 | a2a3 effective (us) | a2a3sim | a5sim |")
          print("| ---- | --- | --- | --- | --- |")
          for case in all_cases:
              cells = [ICON.get(results[p].get(case, "missing"), "?") for p in PLATFORMS]
              print(f"| `{case}` | {cells[0]} | {perf.get(case, '-')} | {cells[1]} | {cells[2]} |")
          EOF
